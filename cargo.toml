[package]
name    = "light-text-transcribing"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow              = "1"
dotenvy             = "0.15"
rayon               = "1"
rustfft             = "6"
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
tokenizers          = "0.19"
tracing             = "0.1"
tracing-subscriber  = { version = "0.3", features = ["env-filter", "fmt"] }

candle-core         = "0.9.2"
candle-nn           = "0.9.2"
candle-transformers = "0.9.2"

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1
panic         = "abort"